<!DOCTYPE html>
<html>
<head>
<title>Transition</title>
<style>  
body {font-family: Tahoma; font-size: 25px; background-color: beige;
    color: brown; text-align: center;}
.sample {
color: #20bf6b;
text-transform: uppercase;
background: #ffffff;
padding: 80px;
border: 4px solid #20bf6b;
border-radius: 6px;
display: inline-block;
transition: all 0.3s ease 0s;
} 
.sample:hover {
color: #494949;
border-radius: 50px;
border-color: #494949;
transition: all 0.3s ease 0s;
}
</style>
</head>
<body>
<h1>The Transition Property</h1>
<p>Hover over the box below, to see the transition effect:</p>
<div class="sample" align="center">Ria Mae L. Nadala</div>
</body>
</html>
